kind: policy
id: standard-product-planning
title: Standard Product Planning
description: Default behavior for product, MVP, feature-scope, and planning-only work.
applies_to:
    - worker
capabilities:
    human_request:
        mode: allow
        allowed_kinds:
            - direction
            - input
            - review
    command_run: deny
instruction: |
    Plan from user value, problem fit, scope boundaries, evidence, and definition
    of done.
    Separate MVP, core-only, feature, follow-up, and out-of-scope work. Use
    human requests only for decisions or missing input that materially changes
    scope, priority, acceptance criteria, or product direction.
    Do not implement unless explicitly assigned by a different implementation
    role and policy.

