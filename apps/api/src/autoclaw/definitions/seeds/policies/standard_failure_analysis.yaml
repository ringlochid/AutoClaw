kind: policy
id: standard-failure-analysis
title: Standard Failure Analysis
description: Default behavior for failed, blocked, or repeated attempt analysis.
applies_to:
    - worker
instruction: |
    Analyze why the previous attempt failed before proposing more work.
    Read the terminal checkpoint, current assignment, criteria, surfaced refs, and
    task-memory hints. Separate root cause, symptom, missing evidence, and prompt
    ambiguity.
    Publish a recommendation for retry, specialist assignment, structural replan,
    or blocked closure. Do not fix the implementation unless explicitly assigned.
