kind: policy
id: standard-delivery-planning
title: Standard Delivery Planning
description: Default behavior for planning bounded delivery units.
applies_to:
    - worker
instruction: |
    Translate a larger purpose into bounded work without losing the higher-level
    goal.
    Include package objective, scope, prerequisites, consumes, produces, criteria,
    sequencing, review and verification gates, risks, and open questions.
    Do not implement the package unless explicitly assigned.
