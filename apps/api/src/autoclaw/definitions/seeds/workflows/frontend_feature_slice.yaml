kind: workflow
id: frontend-feature-slice
description: Plan, implement, visually verify, review, and close one bounded frontend feature slice.
root:
    node_key: root
    kind: root
    role_id: root_planning_lead
    policy_id: standard-root
    description: Preserve frontend feature intent and release only when contract, implementation, visual verification, and review evidence agree.
    instruction: >-
      Keep the frontend slice bounded to the accepted user workflow, route or component ownership, design reference, and API or view-model contract. Route design, contract, accessibility, or visual contradictions to focused review before release.
    criteria:
        - slot: frontend_release_criteria
          description: Hard criteria for frontend slice release.
          criteria:
              - frontend plan explains user workflow, accepted scope, route or component boundary, API or view-model contract, visible states, accessibility expectations, responsive targets, tests, and non-goals
              - implementation, verification, and review evidence refer to the same frontend slice and accepted contract
              - unresolved contract drift, broken state handling, visual regression, inaccessible interaction, text overflow, blank screen, or unverified critical path blocks release
    children:
        - node_key: plan_frontend_contract
          kind: worker
          role_id: frontend_contract_integrator
          policy_id: standard-worker
          description: Inspect frontend context and publish the slice contract, state, fixture, and verification plan.
          instruction: >-
            Publish only contract, state, fixture, route, component, and verification evidence needed to implement the frontend slice safely.
          produces:
              artifacts:
                  - slot: frontend_contract_plan
                    file_hint: frontend_contract_plan.md
                    description: Frontend slice scope, design reference, route and component boundary, API or view-model contract, visible states, fixtures, checks, non-goals, and risks.
        - node_key: implement_frontend_slice
          kind: worker
          role_id: frontend_engineer
          policy_id: standard-worker
          description: Implement the accepted frontend slice.
          instruction: >-
            Read the contract plan first. Keep the patch aligned with existing component primitives, routing, styling, state boundaries, and tests.
          consumes:
              artifacts:
                  - slot: frontend_contract_plan
          criteria:
              - slot: frontend_implementation_criteria
                description: Hard implementation criteria for the frontend slice.
                criteria:
                    - patch implements accepted frontend scope and visible states without changing backend contracts or unrelated UI ownership
                    - raw API or event shapes stay behind typed helpers or mappers when the project has that boundary
                    - checkpoint explains changed areas, evidence read, checks run, screenshots or fixtures used when relevant, assumptions, and residual risk
          produces:
              artifacts:
                  - slot: frontend_patch
                    file_hint: frontend_patch.diff
                    description: Patch for the bounded frontend implementation.
        - node_key: verify_frontend_slice
          kind: worker
          role_id: frontend_visual_verifier
          policy_id: standard-worker-command-run
          description: Verify frontend behavior, visual fit, responsiveness, accessibility, and regression-sensitive paths.
          instruction: >-
            Verify accepted states and critical interactions with the smallest evidence set that proves the slice. Include mobile and desktop evidence when layout changes.
          consumes:
              artifacts:
                  - slot: frontend_contract_plan
                  - slot: frontend_patch
              criteria:
                  - slot: frontend_implementation_criteria
          produces:
              artifacts:
                  - slot: frontend_verification_report
                    file_hint: frontend_verification_report.md
                    description: Verification evidence for frontend behavior, visual fit, responsiveness, accessibility, command results, screenshots, and untested areas.
        - node_key: review_frontend_slice
          kind: worker
          role_id: frontend_code_reviewer
          policy_id: standard-worker
          description: Review the frontend implementation and verification evidence.
          instruction: >-
            Focus on user workflow correctness, contract fit, component and state boundaries, accessibility, visual regressions, styling consistency, and missing tests.
          consumes:
              artifacts:
                  - slot: frontend_contract_plan
                  - slot: frontend_patch
                  - slot: frontend_verification_report
              criteria:
                  - slot: frontend_release_criteria
          produces:
              artifacts:
                  - slot: frontend_review_report
                    file_hint: frontend_review_report.md
                    description: Review findings for the frontend implementation and verification evidence.
        - node_key: release_closure
          kind: worker
          role_id: release_operator
          policy_id: standard-worker
          description: Perform final bounded frontend release or closure work from current surfaced evidence.
          instruction: >-
            Use only frontend contract plan, patch, verification, review evidence, and release criteria. Do not widen into unrelated frontend cleanup.
          consumes:
              artifacts:
                  - slot: frontend_contract_plan
                  - slot: frontend_patch
                  - slot: frontend_verification_report
                  - slot: frontend_review_report
              criteria:
                  - slot: frontend_release_criteria
          produces:
              artifacts:
                  - slot: closure_report
                    file_hint: closure_report.md
                    description: Final frontend release or closure report.
