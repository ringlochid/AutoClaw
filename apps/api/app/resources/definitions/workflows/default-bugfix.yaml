id: default-bugfix
description: Small default workflow pack.
nodes:
  - id: root
    role: planner-supervisor
    mode: plan
  - id: loop
    role: main-loop-worker
    mode: persistent_execute
  - id: review
    role: reviewer
    mode: review
  - id: sync
    role: syncer
    mode: sync
edges:
  - from: root
    to: loop
  - from: loop
    to: review
    when: checkpoint.status == "green"
  - from: loop
    to: root
    when: checkpoint.status in ["blocked", "needs_approval"]
  - from: review
    to: sync
skill_refs:
  - provider: openclaw
    key: contract-checker
