id: max-complexity-review
description: Phase 6 hierarchy and join workflow.
nodes:
  - id: root
    role: planner-supervisor
    mode: plan
    metadata:
      can_spawn_children: true
      can_loop: true
      max_depth: 3
  - id: root.discovery
    role: main-loop-worker
    mode: persistent_execute
  - id: root.product
    role: planner-supervisor
    mode: plan
    metadata:
      can_spawn_children: true
  - id: root.implementation_loop
    role: planner-supervisor
    mode: plan
    metadata:
      can_spawn_children: true
      can_loop: true
  - id: root.implementation_loop.cycle
    role: main-loop-worker
    mode: persistent_execute
  - id: root.review_and_governance
    role: reviewer
    mode: review
  - id: root.review_and_governance.security
    role: reviewer
    mode: review
  - id: root.sync
    role: syncer
    mode: sync
edges:
  - from: root
    to: root.discovery
  - from: root
    to: root.product
  - from: root
    to: root.implementation_loop
  - from: root.implementation_loop
    to: root.implementation_loop.cycle
  - from: root.discovery
    to: root.review_and_governance
    kind: dependency
  - from: root.product
    to: root.review_and_governance
    kind: dependency
  - from: root.implementation_loop.cycle
    to: root.review_and_governance
    kind: dependency
  - from: root.review_and_governance
    to: root.review_and_governance.security
  - from: root.review_and_governance.security
    to: root.sync
skill_refs:
  - provider: openclaw
    key: contract-checker
