kind: workflow
id: default-bugfix
description: Coordinate one bounded bugfix and close only from current evidence.
root:
  id: root
  role: planning_lead
  description: Coordinate a single implementation child for a bounded bugfix.
  instruction: Keep the bugfix scoped to current evidence and criteria.
  criteria:
    - slot: bugfix_acceptance
      description: Acceptance criteria for the bounded bugfix.
      criteria:
        - implementation stays inside the assigned bugfix scope
        - verification evidence demonstrates the intended fix
  children:
    - id: implement_fix
      role: engineer
      policy: standard-worker
      description: Implement the bounded fix and publish patch plus verification evidence.
      instruction: Read the criteria before editing and keep the patch scoped.
      consumes:
        criteria:
          - slot: bugfix_acceptance
      produces:
        artifacts:
          - slot: change_patch
            description: Patch for the bounded bugfix.
            file_hint: change_patch.diff
          - slot: verification_report
            description: Verification evidence for the bounded bugfix.
            file_hint: verification_report.md
