task:
    key: autoclaw-console-command-runs-page
    title: AutoClaw Console Command Runs Page
    summary: Build the task-scoped command-run list, detail, log, and cancel surface.
    instruction: >-
      Implement Command Runs as a dedicated task-scoped page under
      /tasks/:taskId/command-runs. Use controller-backed command-run list, detail, log,
      and cancel routes. Keep the page task-scoped, disclosure-first, command/log
      focused, and free of fake progress rings, ETA, elapsed-time inventions, or
      cross-task dashboard semantics. Match references/frontend_design command-runs
      anchors and meaningful loading/empty/error/detail/log/cancel states. Record
      evidence and ambiguity handling under tmp/autoclaw-frontend/50-command-runs-page.
      Include MSW integration tests, action legality tests, browser evidence,
      accessibility checks, and relevant console validation.
