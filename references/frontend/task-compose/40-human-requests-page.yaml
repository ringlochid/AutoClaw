task:
    key: autoclaw-console-human-requests-page
    title: AutoClaw Console Human Requests Page
    summary: Build the task-scoped typed human-request resolution surface.
    instruction: >-
      Implement Human Requests as a dedicated task-scoped page under
      /tasks/:taskId/human-requests. Use the current controller human-request list and
      resolve routes, keep request summary separate from item-level controls, support
      typed item resolution, options/freeform/notes where the contract allows, and avoid
      generic chat or continue/pause semantics. Match references/frontend_design
      queue-plus-focused-work layout and meaningful states. Record evidence and
      ambiguity handling under tmp/autoclaw-frontend/40-human-requests-page. Include MSW
      integration tests, form/action tests, browser evidence, focus/keyboard checks, and
      relevant console validation.
workflow:
    key: frontend-feature-slice
roots:
    workspace:
        mode: use_existing_host
        host_path: /home/ubuntu/leo/projects/autoclaw
    context:
        mode: ensure_host_path
        host_path: /home/ubuntu/leo/projects/autoclaw/tmp/autoclaw-frontend/40-human-requests-page
