kind: workflow
id: frontend-console-delivery-program
description: Audit the AutoClaw console frontend sources, lock contracts, and publish implementation-ready frontend slice launches without implementation.
root:
    id: root
    role: root_planning_lead
    policy: standard-root-planning
    description: Preserve the full console frontend delivery purpose and close only when plans, contracts, compose drafts, and review evidence are implementation-ready.
    instruction: >-
      Keep this workflow in planning and contract-locking mode. Do not implement React
      code from this workflow. Route design, API, docs, or workflow-shape contradictions
      to focused planning or review before closure.
    criteria:
        - slot: frontend_program_criteria
          description: Hard criteria for frontend delivery-program planning closure.
          criteria:
              - source audit covers the current AutoClaw repo, copied design references, external design repo, console scaffold, API contracts, tests, and existing dirty worktree boundaries
              - comprehensive plan is written under references/frontend and sequences bounded frontend slices with dependencies, criteria, review, verification, browser/manual evidence, and debt policy
              - locked frontend contracts, feature behavior docs, component/system docs, and ambiguity decisions are written under docs-internal/design/v2/console
              - task-compose drafts exist for the plan/contract task, each implementation slice, and final suite release review, with workspace bound to the AutoClaw repo and context/evidence under tmp
              - unresolved contract, design, launch, or implementation ambiguity is recorded with a route instead of silently pushed into coding work
              - no frontend implementation changes are performed by this workflow
    children:
        - id: audit_frontend_sources
          role: researcher
          policy: standard-worker
          description: Audit repo, design, API, scaffold, tests, and worktree truth needed for frontend delivery planning.
          instruction: >-
            Inspect only the evidence needed to make the frontend implementation plan
            honest. Record stale, missing, conflicting, or risky inputs explicitly.
          produces:
              artifacts:
                  - slot: frontend_source_audit
                    file_hint: frontend_source_audit.md
                    description: Source, design, API, scaffold, test, worktree, and ambiguity audit for the console frontend build.
        - id: plan_frontend_delivery
          role: frontend_contract_planner
          policy: standard-delivery-planning
          description: Produce the comprehensive frontend delivery plan and package sequencing.
          instruction: >-
            Turn source audit evidence into bounded frontend slices, sequencing,
            dependencies, acceptance criteria, verification gates, and review points.
          consumes:
              artifacts:
                  - slot: frontend_source_audit
          produces:
              artifacts:
                  - slot: frontend_delivery_plan
                    file_hint: frontend_delivery_plan.md
                    description: Comprehensive frontend implementation plan with package order, dependencies, criteria, reviews, validation, and risks.
        - id: lock_frontend_contracts
          role: frontend_contract_planner
          policy: standard-worker
          description: Write frontend contracts, feature behavior docs, component boundaries, and evidence rules.
          instruction: >-
            Write implementation-ready docs in the requested internal docs path.
            Separate controller data contracts, design behavior, component contracts,
            environment/setup rules, and test evidence.
          consumes:
              artifacts:
                  - slot: frontend_source_audit
                  - slot: frontend_delivery_plan
          produces:
              artifacts:
                  - slot: frontend_contract_docs
                    file_hint: frontend_contract_docs.md
                    description: Locked frontend contract-doc inventory, written paths, behavior/component contracts, and open decisions.
        - id: draft_frontend_launches
          role: frontend_contract_planner
          policy: standard-worker
          description: Draft task-compose launches for each frontend implementation slice and final release review.
          instruction: >-
            Use the delivery plan and contract docs to produce launch files that are
            bounded enough for independent AutoClaw execution. Do not start them from
            this workflow.
          consumes:
              artifacts:
                  - slot: frontend_delivery_plan
                  - slot: frontend_contract_docs
          produces:
              artifacts:
                  - slot: frontend_task_compose_bundle
                    file_hint: frontend_task_compose_bundle.md
                    description: Task-compose file list, launch order, root bindings, slice summaries, and start readiness notes.
        - id: review_frontend_program
          role: scope_reviewer
          policy: standard-scope-review
          description: Review the frontend delivery program for scope, evidence, sequencing, and acceptance gaps.
          instruction: >-
            Check whether the plan, contracts, and task-compose bundle are sufficient to
            start bounded implementation slices without hidden assumptions.
          consumes:
              artifacts:
                  - slot: frontend_source_audit
                  - slot: frontend_delivery_plan
                  - slot: frontend_contract_docs
                  - slot: frontend_task_compose_bundle
              criteria:
                  - slot: frontend_program_criteria
          produces:
              artifacts:
                  - slot: frontend_program_review
                    file_hint: frontend_program_review.md
                    description: Scope, sequencing, acceptance, risk, and launch-readiness review for the frontend delivery program.
        - id: release_planning_closure
          role: release_operator
          policy: standard-release
          description: Close the planning and contract-locking stage from current evidence.
          instruction: >-
            Use only source audit, delivery plan, contract docs, task-compose bundle,
            review evidence, and program criteria. Do not reopen implementation scope.
          consumes:
              artifacts:
                  - slot: frontend_source_audit
                  - slot: frontend_delivery_plan
                  - slot: frontend_contract_docs
                  - slot: frontend_task_compose_bundle
                  - slot: frontend_program_review
              criteria:
                  - slot: frontend_program_criteria
          produces:
              artifacts:
                  - slot: closure_report
                    file_hint: closure_report.md
                    description: Planning-stage closure report, launch readiness, blockers, and next recommended task-compose start.
