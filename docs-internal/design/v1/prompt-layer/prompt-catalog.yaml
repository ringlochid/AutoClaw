version: 1
owner_docs:
    - contract.md
    - source-and-sections.md
    - machine-contract.md
    - prompt-pack/runtime-rule-blocks.md
    - prompt-pack/system-and-provider-block.md
    - prompt-pack/validation-and-reject-blocks.md
section_order:
    - operating_model
    - task_identity
    - node_purpose
    - current_dispatch
    - capabilities_now
    - workflow_manifest
    - current_assignment
    - latest_checkpoint_context
    - boundary_followup_guidance
    - consumed_durable_refs
    - transient_refs
    - task_memory
    - allowed_actions_now
    - publication_rule
static_sections:
    - operating_model
    - task_identity
    - node_purpose
send_modes:
    - id: full_prompt
      meaning: Fresh inline send of the full prompt package.
      required_for:
          - first_dispatch
          - retry
prompt_families:
    - id: worker_dispatch_prompt
      audience: worker, review, qa, release, audit leaf nodes
      node_kinds:
          - worker
      allowed_send_modes:
          - full_prompt
      required_sections:
          - operating_model
          - task_identity
          - node_purpose
          - current_dispatch
          - capabilities_now
          - workflow_manifest
          - current_assignment
          - boundary_followup_guidance
          - consumed_durable_refs
          - allowed_actions_now
          - publication_rule
      conditionally_required_sections:
          - section: latest_checkpoint_context
            when: a prior relevant checkpoint is part of the current execution or retry handover
          - section: transient_refs
            when: explicit transient carryover is surfaced for the current assignment
          - section: task_memory
            when: task_memory_search_hints or curated task-memory refs are surfaced for the current assignment
      closure_modes:
          - green
          - retry
          - blocked
      rules:
          - current_assignment is the runtime-projected mission contract for the current node
          - consumed_durable_refs carries exact runtime-resolved durable refs
          - boundary_followup_guidance interprets initial, retry, green, and blocked handoffs without creating new prompt families
          - human_request and command_run use guides render independently when the current effective capability allows that capability family
          - checkpoint guidance teaches decision-relevant handoff delta, exact produced slot/path claims, and retrieval-oriented task-memory hints
          - record_checkpoint publishes durable handoff before terminal boundary
          - produces are requirements, not published refs
      exact_blocks:
          full_prompt_instructions:
              - autoclaw_system_block_v1
              - runtime_concept_glossary_v1
              - runtime_read_order_rule_v1
              - artifact_render_rule_v1
              - task_memory_rule_v1
              - monitoring_not_task_truth_v1
              - autoclaw_provider_continuity_block_v1
              - worker_dispatch_opening_v1
              - worker_assignment_doctrine_v1
              - checkpoint_authoring_guide_v1
              - runtime_boundary_rule_block_v1
              - runtime_legality_block_worker_v1
          conditional_full_prompt_instructions:
              - human_request_use_guide_v1
              - command_run_use_guide_v1
      generated_examples:
          - worker_dispatch_prompt_full_prompt
          - worker_dispatch_prompt_blocked_ending_sketch
    - id: parent_root_dispatch_prompt
      audience: parent and root nodes
      node_kinds:
          - parent
          - root
      allowed_send_modes:
          - full_prompt
      required_sections:
          - operating_model
          - task_identity
          - node_purpose
          - current_dispatch
          - capabilities_now
          - workflow_manifest
          - current_assignment
          - boundary_followup_guidance
          - allowed_actions_now
          - publication_rule
      conditionally_required_sections:
          - section: latest_checkpoint_context
            when: the current parent/root decision depends on surfaced child or prior-attempt checkpoint evidence
          - section: consumed_durable_refs
            when: surfaced durable evidence is part of the current decision
          - section: transient_refs
            when: explicit transient carryover is surfaced for the current decision
          - section: task_memory
            when: task_memory_search_hints or curated task-memory refs are surfaced for the current decision
      closure_modes:
          - yield
          - green
          - blocked
      rules:
          - current_assignment is the runtime-projected mission contract for the current node
          - parent/root is purpose-first and mode-aware while delegating heavy planning, implementation, review, and verification to children
          - parent/root reads its own current assignment as the scope contract for the subtree it owns before writing any child assignment
          - parent/root leads through iterative assignment, evidence audit, follow-up questioning, and specialist routing rather than one-shot solo completion
          - parent/root asks children for interface maps, test-scene maps, and documentation navigation when those judgments are needed for the owned slice
          - current assignment doctrine and child assignment writing guidance stay separate for parent/root prompts
          - assign_child guidance packages bounded research into summary, instruction, supplemental durable slots, transient surfaces, and retrieval-oriented task-memory hints
          - assign_child authors only assignment_intent, supplemental_durable_context, and explicit transient_surfaces
          - bounded research sharpens child assignment quality rather than replacing child implementation
          - child green is evidence rather than release authority, and child blocked is routing input rather than automatic whole-flow blocked closure
          - boundary_followup_guidance interprets initial, retry, green, and blocked handoffs without creating new prompt families
          - checkpoint guidance teaches decision-relevant handoff delta, exact produced slot/path claims, and retrieval-oriented task-memory hints
          - consumed_durable_refs carries exact runtime-resolved durable refs
          - yield is legal only after exactly one staged child assignment exists
          - release_green and root release_blocked are terminal preconditions, not yield basis
          - human_request and command_run use guides render independently when the current effective capability allows that capability family
      exact_blocks:
          full_prompt_instructions:
              - autoclaw_system_block_v1
              - runtime_concept_glossary_v1
              - runtime_read_order_rule_v1
              - artifact_render_rule_v1
              - task_memory_rule_v1
              - monitoring_not_task_truth_v1
              - autoclaw_provider_continuity_block_v1
              - parent_root_dispatch_opening_v1
              - parent_root_orchestration_doctrine_v1
              - parent_root_current_assignment_doctrine_v1
              - parent_root_child_assignment_writing_guide_v1
              - checkpoint_authoring_guide_v1
              - runtime_boundary_rule_block_v1
              - runtime_legality_block_parent_v1
          conditional_full_prompt_instructions:
              - human_request_use_guide_v1
              - command_run_use_guide_v1
      generated_examples:
          - parent_root_dispatch_prompt_full_prompt
          - parent_root_dispatch_prompt_non_root_blocked_full_prompt
exact_blocks:
    - id: autoclaw_system_block_v1
      owner_file: prompt-pack/system-and-provider-block.md
      role: exact_system_block
      purpose: teach controller-owned authority, visible runtime truth, boundary identity, context direction, and current term exclusions
      consumption: live_instruction_block
    - id: autoclaw_provider_continuity_block_v1
      owner_file: prompt-pack/system-and-provider-block.md
      role: provider_transport_rule
      purpose: teach send-mode, retry, and provider-continuity semantics without redefining runtime truth
      consumption: live_instruction_block
    - id: worker_dispatch_opening_v1
      owner_file: prompt-pack/system-and-provider-block.md
      role: worker_dispatch_opening_block
      purpose: teach worker read order, checkpoint publication, and terminal closure posture
      consumption: live_instruction_block
    - id: parent_root_dispatch_opening_v1
      owner_file: prompt-pack/system-and-provider-block.md
      role: parent_root_dispatch_opening_block
      purpose: teach parent/root orchestration posture, bounded research for delegation, and staged-child-only yield posture
      consumption: live_instruction_block
    - id: parent_root_current_assignment_doctrine_v1
      owner_file: prompt-pack/runtime-rule-blocks.md
      role: parent_root_current_assignment_doctrine
      purpose: teach how parent/root nodes read and decide from their own current assignment before inspecting, assigning children, replanning, releasing, or blocking
      consumption: live_instruction_block
    - id: parent_root_child_assignment_writing_guide_v1
      owner_file: prompt-pack/runtime-rule-blocks.md
      role: parent_root_child_assignment_writing_guide
      purpose: teach how bounded research becomes summary, instruction, durable slot sharing, transient carryover, and retrieval-oriented search hints for assign_child
      consumption: live_instruction_block
    - id: human_request_use_guide_v1
      owner_file: prompt-pack/runtime-rule-blocks.md
      role: human_request_use_guide
      purpose: teach when and how to open typed human requests when the current effective capability allows them
      consumption: live_instruction_block
    - id: command_run_use_guide_v1
      owner_file: prompt-pack/runtime-rule-blocks.md
      role: command_run_use_guide
      purpose: teach when and how to start controller-managed long command runs when the current effective capability allows them
      consumption: live_instruction_block
    - id: runtime_concept_glossary_v1
      owner_file: prompt-pack/runtime-rule-blocks.md
      role: runtime_concept_glossary
      purpose: explain purpose, mode, role, policy, workflow manifest, assignment, criteria, consumes, produces, refs, checkpoints, and boundaries without assuming product vocabulary
      consumption: live_instruction_block
    - id: worker_assignment_doctrine_v1
      owner_file: prompt-pack/runtime-rule-blocks.md
      role: worker_assignment_doctrine
      purpose: teach worker purpose orientation, mode discipline, evidence acquisition, criteria judgment, and checkpoint quality
      consumption: live_instruction_block
    - id: parent_root_orchestration_doctrine_v1
      owner_file: prompt-pack/runtime-rule-blocks.md
      role: parent_root_orchestration_doctrine
      purpose: teach purpose-first subtree leadership, iterative specialist delegation, evidence skepticism, interface/test/doc judgment, mission packets, and safe replan sequencing
      consumption: live_instruction_block
    - id: checkpoint_authoring_guide_v1
      owner_file: prompt-pack/runtime-rule-blocks.md
      role: checkpoint_authoring_guide
      purpose: teach checkpoint authoring as durable decision-relevant handoff with exact slot/path claims, optional carryover, and retrieval-oriented search hints
      consumption: live_instruction_block
    - id: runtime_legality_block_worker_v1
      owner_file: prompt-pack/runtime-rule-blocks.md
      role: worker_legality_rule
      purpose: bind worker prompts to semantic assignment handoff, runtime-resolved durable refs, record_checkpoint, and terminal boundaries
      consumption: live_instruction_block
    - id: runtime_legality_block_parent_v1
      owner_file: prompt-pack/runtime-rule-blocks.md
      role: parent_root_legality_rule
      purpose: bind parent/root prompts to semantic assign_child handoff, bounded research for delegation, staged-child-only yield, and record_checkpoint
      consumption: live_instruction_block
    - id: runtime_boundary_rule_block_v1
      owner_file: prompt-pack/runtime-rule-blocks.md
      role: boundary_rule
      purpose: freeze exact dispatch ingress, record_checkpoint split, staged-child-only yield, and terminal boundary wording
      consumption: live_instruction_block
    - id: retry_handover_rule_v1
      owner_file: prompt-pack/runtime-rule-blocks.md
      role: retry_rule
      purpose: freeze same-assignment retry, new-attempt minting, and prior-checkpoint handoff wording
      consumption: reference_only
    - id: runtime_read_order_rule_v1
      owner_file: prompt-pack/runtime-rule-blocks.md
      role: read_order_rule
      purpose: freeze the manifest-first runtime read ladder as live instruction instead of duplicating it inside the system block
      consumption: live_instruction_block
    - id: current_task_state_frame_v1
      owner_file: prompt-pack/runtime-rule-blocks.md
      role: section_coverage_rule
      purpose: require semantic assignment handoff, checkpoint handoff, runtime-resolved durable refs, and task-memory guidance in the rendered prompt state
      consumption: reference_only
    - id: artifact_render_rule_v1
      owner_file: prompt-pack/runtime-rule-blocks.md
      role: artifact_render_rule
      purpose: freeze compact runtime durable artifact rendering to slot, version, path, and description as live instruction
      consumption: live_instruction_block
    - id: task_memory_rule_v1
      owner_file: prompt-pack/runtime-rule-blocks.md
      role: task_memory_rule
      purpose: keep task memory search-oriented and separate from required consumes as live instruction
      consumption: live_instruction_block
    - id: monitoring_not_task_truth_v1
      owner_file: prompt-pack/runtime-rule-blocks.md
      role: monitoring_rule
      purpose: teach that _runtime/dispatch projections are observability only as live instruction
      consumption: live_instruction_block
    - id: worker_runtime_opening_example_v1
      owner_file: prompt-pack/runtime-rule-blocks.md
      role: runtime_opening_example
      purpose: show the exact worker dispatch opening style with record_checkpoint and runtime-resolved durable refs
      consumption: reference_only
    - id: parent_root_runtime_opening_example_v1
      owner_file: prompt-pack/runtime-rule-blocks.md
      role: runtime_opening_example
      purpose: show the exact parent/root dispatch opening style with bounded research for a tighter child brief plus semantic assign_child handoff and staged-child-only yield
      consumption: reference_only
generated_artifacts:
    - id: rendered_examples
      path: generated/rendered-examples.md
      purpose: canonicalized rendered dispatch examples from the live full_prompt-only runtime
generated_examples:
    - id: parent_root_dispatch_prompt_full_prompt
      rendered_heading: parent_root_dispatch_prompt
      family: parent_root_dispatch_prompt
      send_mode: full_prompt
      source_file: generated/rendered-examples.md
      focus: bounded research for a tighter child brief, semantic assign_child handoff, runtime-resolved durable refs, record_checkpoint, and staged-child-only yield
    - id: parent_root_dispatch_prompt_non_root_blocked_full_prompt
      rendered_heading: parent_root_dispatch_prompt non-root blocked closure
      family: parent_root_dispatch_prompt
      send_mode: full_prompt
      source_file: generated/rendered-examples.md
      focus: non-root parent terminal blocked closure without root-only release_blocked
    - id: worker_dispatch_prompt_full_prompt
      rendered_heading: worker_dispatch_prompt
      family: worker_dispatch_prompt
      send_mode: full_prompt
      source_file: generated/rendered-examples.md
      focus: semantic assignment handoff, retry handover, consumed durable refs, record_checkpoint, and produce requirements
    - id: worker_dispatch_prompt_blocked_ending_sketch
      rendered_heading: worker_dispatch_prompt blocked-ending sketch
      family: worker_dispatch_prompt
      send_mode: full_prompt
      source_file: generated/rendered-examples.md
      focus: progress checkpoint handoff and the final blocked-vs-retry closure guidance
validation_references:
    - id: operation_failure_envelope
      canonical_surface: operation_failure
      owner_docs:
          - prompt-pack/validation-and-reject-blocks.md
          - ../interfaces/api-schema-appendix.md
      purpose: route readers to prompt-layer reject wording plus the stable API carrier fields
    - id: boundary_precondition_failed_rule
      canonical_surface: boundary_precondition_failed
      owner_docs:
          - prompt-pack/validation-and-reject-blocks.md
          - ../architecture/runtime-boundary-and-controller-loop-contract.md
          - ../interfaces/api-schema-appendix.md
      purpose: exact reject semantics for boundary closure attempts that lack committed basis plus the stable API carrier fields
rules:
    - full_prompt is the only live canonical send mode
    - current_assignment renders the runtime-projected mission contract only
    - criteria ownership stays preserved in manifest/compiler truth and does not widen assignment or consumed_durable_refs with owner_node_key
    - consumed_durable_refs renders exact runtime-resolved durable refs
    - delivery-state persistence is raw observability only and does not define prompt or controller control-state semantics
    - produces are requirements, not published refs
    - record_checkpoint is the durable handoff lane
    - task_memory_search_hints are retrieval-oriented search prompts, not generic tags or implicit consumes
    - structural-edit guidance starts from role/policy names surfaced in the compact structural_edit_palette and may use current-only search_definitions or get_definition lookup when that palette is insufficient
    - yield is legal only after exactly one staged child assignment exists
    - release_green and root release_blocked are terminal preconditions, not yield basis
    - prompt surfaces must not teach checkpoint control_effects
validator_checks:
    - freeze exactly two canonical dispatch prompt families
    - treat exact_blocks as reusable wording registries, not extra prompt families
    - generated examples must preserve canonical section order and current field names
    - generated examples must keep semantic current_assignment and runtime-resolved consumed_durable_refs separate
    - generated examples must keep checkpoint_kind and outcome legality aligned
    - criteria owner preservation must remain in manifest/runtime truth rather than widening rendered criteria refs
    - parent_root_dispatch_prompt closure_modes are exactly yield, green, blocked
    - generated examples must not teach yield after release_green or root release_blocked
    - non-root parent examples must teach terminal blocked closure and must not surface release_blocked as an allowed non-root action
    - prompt-layer owner and generated surfaces must keep delivery-state observability separate from controller control-state semantics
    - generated examples must not surface control_effects
    - live prompt-layer owner and generated surfaces must not route normative semantics to legacy source packs
