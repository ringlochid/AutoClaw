services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: autoclaw
      POSTGRES_PASSWORD: autoclaw
      POSTGRES_DB: autoclaw
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autoclaw -d autoclaw"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - autoclaw-postgres:/var/lib/postgresql/data
      - ./infra/compose/postgres/init:/docker-entrypoint-initdb.d:ro

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AUTOCLAW_ENV: development
      AUTOCLAW_DEBUG: "true"
      AUTOCLAW_DATABASE_URL: postgresql+asyncpg://autoclaw:autoclaw@postgres:5432/autoclaw
      AUTOCLAW_OPENCLAW_BASE_URL: http://host.docker.internal:18789
      AUTOCLAW_OPENCLAW_ACCOUNT: orin_a
      AUTOCLAW_OPENCLAW_GATEWAY_TOKEN: ${AUTOCLAW_OPENCLAW_GATEWAY_TOKEN:?set AUTOCLAW_OPENCLAW_GATEWAY_TOKEN}
      AUTOCLAW_OPENCLAW_AGENT_ID: ${AUTOCLAW_OPENCLAW_AGENT_ID:-autoclaw-worker}
      AUTOCLAW_OPENCLAW_TIMEOUT_MS: ${AUTOCLAW_OPENCLAW_TIMEOUT_MS:-120000}
      AUTOCLAW_API_KEY: ${AUTOCLAW_API_KEY:?set AUTOCLAW_API_KEY}
      AUTOCLAW_INTERNAL_API_KEY: ${AUTOCLAW_INTERNAL_API_KEY:?set AUTOCLAW_INTERNAL_API_KEY}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:8001:8000"
    command:
      - sh
      - -lc
      - cd /app/apps/api && alembic upgrade head && PYTHONPATH=. uvicorn app.main:app --host 0.0.0.0 --port 8000

  api-test:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AUTOCLAW_ENV: test
      AUTOCLAW_DEBUG: "false"
      AUTOCLAW_DATABASE_URL: postgresql+asyncpg://autoclaw:autoclaw@postgres:5432/autoclaw_test
      AUTOCLAW_OPENCLAW_BASE_URL: http://host.docker.internal:18789
      AUTOCLAW_OPENCLAW_ACCOUNT: orin_a
      AUTOCLAW_OPENCLAW_GATEWAY_TOKEN: autoclaw-openclaw-test-token
      AUTOCLAW_OPENCLAW_AGENT_ID: autoclaw-worker
      AUTOCLAW_OPENCLAW_TIMEOUT_MS: 120000
      AUTOCLAW_API_KEY: autoclaw-operator-test-key
      AUTOCLAW_INTERNAL_API_KEY: autoclaw-internal-test-key
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - sh
      - -lc
      - cd /app/apps/api && alembic upgrade head && PYTHONPATH=. pytest tests/unit tests/integration -q

volumes:
  autoclaw-postgres:
